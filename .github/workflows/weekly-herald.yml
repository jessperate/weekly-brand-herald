name: Weekly Brand Herald

on:
  schedule:
    # Every Friday at 9:00 AM ET (14:00 UTC)
    - cron: '0 14 * * 5'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  generate-herald:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name "Brand Herald Bot"
          git config user.email "herald-bot@airops.com"

      - name: Generate weekly herald
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "$(cat scripts/herald-prompt.md)" \
            --allowedTools "Read,Write,Edit,Bash" \
            --max-turns 20
